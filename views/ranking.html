<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking - Pou Money</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0C15; color: #E8EDF2; }
        .navbar { background: rgba(10, 12, 21, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(108, 92, 231, 0.2); padding: 16px 0; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; display: flex; justify-content: space-between; align-items: center; }
        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .brand-icon { width: 42px; height: 42px; background: linear-gradient(135deg, #6C5CE7, #00BFA3); border-radius: 14px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .brand-icon img { width: 35px; height: 35px; }
        .brand-text { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #FFFFFF, #6C5CE7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-menu { display: flex; gap: 24px; align-items: center; }
        .nav-link { color: #A0A8C0; text-decoration: none; font-weight: 500; transition: all 0.3s; }
        .nav-link:hover, .nav-link.active { color: #6C5CE7; }
        .btn { padding: 8px 20px; border-radius: 40px; font-weight: 600; text-decoration: none; }
        .btn-primary { background: linear-gradient(135deg, #6C5CE7, #00BFA3); color: white; }
        .main-content { padding: 100px 32px 60px; }
        .ranking-header { text-align: center; margin-bottom: 40px; }
        .ranking-header h1 { font-size: 42px; margin-bottom: 16px; }
        .tabs { display: flex; justify-content: center; gap: 16px; margin-bottom: 32px; }
        .tab { padding: 10px 28px; background: rgba(20, 24, 36, 0.6); border: 1px solid rgba(108, 92, 231, 0.2); border-radius: 40px; cursor: pointer; transition: all 0.3s; }
        .tab.active { background: linear-gradient(135deg, #6C5CE7, #00BFA3); border-color: transparent; }
        .ranking-table { background: rgba(20, 24, 36, 0.6); border-radius: 24px; overflow: hidden; border: 1px solid rgba(108, 92, 231, 0.15); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 16px 20px; text-align: left; border-bottom: 1px solid rgba(108, 92, 231, 0.1); }
        th { background: rgba(108, 92, 231, 0.15); color: #6C5CE7; font-weight: 600; }
        .rank-1 td:first-child { color: #FFD700; font-weight: bold; font-size: 20px; }
        .rank-2 td:first-child { color: #C0C0C0; font-weight: bold; font-size: 18px; }
        .rank-3 td:first-child { color: #CD7F32; font-weight: bold; font-size: 18px; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #6C5CE7, #00BFA3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .loading { text-align: center; padding: 40px; color: #8A92AB; }
        @media (max-width: 768px) { th, td { padding: 10px 12px; font-size: 12px; } .container { padding: 0 16px; } .nav-menu { display: none; } }
        .mobile-menu-btn { display: none; background: none; border: none; font-size: 24px; color: white; cursor: pointer; }
        @media (max-width: 768px) { .mobile-menu-btn { display: block; } }
        .mobile-nav { display: none; position: fixed; top: 74px; left: 0; width: 100%; background: #0F111A; padding: 20px; flex-direction: column; gap: 16px; z-index: 999; }
        .mobile-nav a { color: #A0A8C0; text-decoration: none; padding: 10px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="brand"><div class="brand-icon"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%236C5CE7'/%3E%3Ccircle cx='35' cy='40' r='6' fill='white'/%3E%3Ccircle cx='65' cy='40' r='6' fill='white'/%3E%3C/svg%3E"></div><div class="brand-text">POU MONEY</div></a>
            <div class="nav-menu"><a href="index.html" class="nav-link">Início</a><a href="jogar.html" class="nav-link">Jogar</a><a href="ranking.html" class="nav-link active">Ranking</a><a href="suporte.html" class="nav-link">Suporte</a><a href="login.html" class="btn btn-primary">Entrar</a></div>
            <button class="mobile-menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
        </div>
        <div class="mobile-nav" id="mobileNav"><a href="index.html">Início</a><a href="jogar.html">Jogar</a><a href="ranking.html">Ranking</a><a href="suporte.html">Suporte</a><a href="login.html">Entrar</a></div>
    </nav>

    <div class="main-content">
        <div class="ranking-header"><h1>🏆 Ranking Global</h1><p>Os melhores jogadores do Pou Money</p></div>
        <div class="tabs"><div class="tab active" data-tab="geral">Ranking Geral</div><div class="tab" data-tab="semanal">Ranking Semanal</div></div>
        <div class="ranking-table" id="rankingContainer"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando ranking...</div></div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let currentTab = 'geral';
        
        async function loadRanking() {
            const container = document.getElementById('rankingContainer');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>';
            
            try {
                const endpoint = currentTab === 'geral' ? '/api/ranking' : '/api/ranking/semanal';
                const response = await fetch(`${API_URL}${endpoint}`);
                const data = await response.json();
                
                if (data.length === 0) {
                    container.innerHTML = '<div class="loading">Nenhum jogador no ranking ainda. Seja o primeiro!</div>';
                    return;
                }
                
                let html = '<table><thead><tr><th>#</th><th>Jogador</th><th>Pontos</th><th>Nível</th><th>Moedas</th></tr></thead><tbody>';
                data.forEach((user, index) => {
                    let rankClass = '';
                    if (index === 0) rankClass = 'rank-1';
                    else if (index === 1) rankClass = 'rank-2';
                    else if (index === 2) rankClass = 'rank-3';
                    
                    html += `<tr class="${rankClass}">
                        <td><strong>${index + 1}º</strong></td>
                        <td><div class="user-info"><div class="user-avatar">${user.nome.charAt(0)}</div>${user.nome}</div></td>
                        <td>${user.pontos || user.pontos_semana || 0}</td>
                        <td>${user.nivel || 1}</td>
                        <td>${user.moedas || 0}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = '<div class="loading">Erro ao carregar ranking. Tente novamente.</div>';
            }
        }
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                loadRanking();
            });
        });
        
        loadRanking();
        
        const menuBtn = document.getElementById('menuBtn');
        const mobileNav = document.getElementById('mobileNav');
        menuBtn.addEventListener('click', () => { mobileNav.style.display = mobileNav.style.display === 'flex' ? 'none' : 'flex'; });
    </script>
</body>
</html>
