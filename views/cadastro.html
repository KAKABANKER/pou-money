<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta — Pou Money</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#06080F;--surface:#0D1120;--card:#121828;--border:rgba(255,255,255,0.06);--green:#00E676;--purple:#7C6AFF;--red:#FF4757;--text:#E8EDF5;--muted:#5A6380;--font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:var(--font-body);background:var(--bg);color:var(--text)}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;position:relative;overflow:hidden}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;animation:float 8s ease-in-out infinite}
.orb1{width:500px;height:500px;background:var(--purple);top:-150px;right:-100px}
.orb2{width:350px;height:350px;background:var(--green);bottom:-100px;left:-80px;animation-delay:4s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.card{position:relative;z-index:1;background:rgba(13,17,32,.92);border:1px solid var(--border);border-radius:28px;padding:40px;width:100%;max-width:500px;backdrop-filter:blur(20px);box-shadow:0 32px 80px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--purple),var(--green));border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:24px}
.logo h1{font-family:var(--font-head);font-size:24px;background:linear-gradient(90deg,#fff,var(--purple));-webkit-background-clip:text;background-clip:text;color:transparent}
.badge-bonus{background:linear-gradient(135deg,rgba(0,230,118,.1),rgba(124,106,255,.08));border:1px solid rgba(0,230,118,.2);border-radius:12px;padding:10px 14px;text-align:center;margin-bottom:22px;font-size:13px;color:var(--green)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.full{grid-column:1/-1}
.form-group{margin-bottom:0}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.input-wrap{position:relative}
.input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
input{width:100%;padding:13px 14px 13px 40px;background:rgba(6,8,15,.6);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:var(--font-body);outline:none;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,106,255,.12)}
input::placeholder{color:var(--muted)}
input.invalid{border-color:var(--red)}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px}
.error-box{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);border-radius:12px;padding:11px 14px;color:#ff6b78;font-size:13px;display:none;margin-top:14px;align-items:center;gap:8px}
.error-box.show{display:flex}
.btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,var(--purple),var(--green));border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;font-family:var(--font-head);cursor:pointer;transition:opacity .2s,transform .1s;margin-top:16px}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.link-row{text-align:center;color:var(--muted);font-size:13px;margin-top:18px}
.link-row a{color:var(--green);text-decoration:none;font-weight:600}
.hint{font-size:11px;color:var(--muted);margin-top:4px}
@media(max-width:440px){.form-grid{grid-template-columns:1fr}.full{grid-column:1}}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="card">
    <div class="logo">
        <div class="logo-icon">🐾</div>
        <h1>Criar Conta</h1>
    </div>
    <div class="badge-bonus">🎁 Ganhe <strong>R$ 10,00 + 100 moedas</strong> ao se cadastrar!</div>
    <form id="cadastroForm" novalidate>
        <div class="form-grid">
            <div class="form-group full">
                <label>Nome completo *</label>
                <div class="input-wrap"><i class="fas fa-user"></i><input type="text" id="nome" placeholder="Seu nome" required autocomplete="name"></div>
            </div>
            <div class="form-group full">
                <label>Email *</label>
                <div class="input-wrap"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="seu@email.com" required autocomplete="email"></div>
            </div>
            <div class="form-group">
                <label>CPF <span style="color:var(--muted)">(opcional)</span></label>
                <div class="input-wrap"><i class="fas fa-id-card"></i><input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14"></div>
            </div>
            <div class="form-group">
                <label>Telefone <span style="color:var(--muted)">(opcional)</span></label>
                <div class="input-wrap"><i class="fas fa-phone"></i><input type="tel" id="telefone" placeholder="(11) 99999-9999"></div>
            </div>
            <div class="form-group">
                <label>Senha *</label>
                <div class="input-wrap"><i class="fas fa-lock"></i><input type="password" id="senha" placeholder="Min. 6 caracteres" required autocomplete="new-password"></div>
                <div class="hint">Mínimo 6 caracteres</div>
            </div>
            <div class="form-group">
                <label>Confirmar senha *</label>
                <div class="input-wrap"><i class="fas fa-lock"></i><input type="password" id="confirmar" placeholder="Repita a senha" required autocomplete="new-password"><button type="button" class="eye-btn" id="toggleSenha"><i class="fas fa-eye"></i></button></div>
            </div>
        </div>
        <div id="errorBox" class="error-box"><i class="fas fa-exclamation-circle"></i><span id="errorMsg"></span></div>
        <button type="submit" class="btn-primary" id="submitBtn">Criar Conta Gratuita</button>
    </form>
    <div class="link-row">Já tem conta? <a href="/login">Fazer login →</a></div>
</div>
<script src="/assets/auth.js"></script>
<script>
Auth.checarSessaoPublica();

// Máscara CPF
document.getElementById('cpf').addEventListener('input', function() {
    let v = this.value.replace(/\D/g,'');
    if(v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{0,2})/,'$1.$2.$3-$4');
    else if(v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{0,3})/,'$1.$2.$3');
    else if(v.length > 3) v = v.replace(/(\d{3})(\d{0,3})/,'$1.$2');
    this.value = v;
});

// Máscara telefone
document.getElementById('telefone').addEventListener('input', function() {
    let v = this.value.replace(/\D/g,'');
    if(v.length > 10) v = v.replace(/(\d{2})(\d{5})(\d{0,4})/,'($1) $2-$3');
    else if(v.length > 6) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/,'($1) $2-$3');
    else if(v.length > 2) v = v.replace(/(\d{2})(\d{0,5})/,'($1) $2');
    this.value = v;
});

document.getElementById('toggleSenha').addEventListener('click', function() {
    const s = document.getElementById('senha');
    const c = document.getElementById('confirmar');
    const icon = this.querySelector('i');
    const show = s.type === 'password';
    s.type = c.type = show ? 'text' : 'password';
    icon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
});

function showError(msg) {
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('errorBox').classList.add('show');
}

function validarCPF(cpf) {
    cpf = cpf.replace(/\D/g,'');
    if(cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;
    let soma = 0;
    for(let i=0;i<9;i++) soma += parseInt(cpf[i])*(10-i);
    let r = (soma*10)%11;
    if(r===10||r===11) r=0;
    if(r !== parseInt(cpf[9])) return false;
    soma = 0;
    for(let i=0;i<10;i++) soma += parseInt(cpf[i])*(11-i);
    r = (soma*10)%11;
    if(r===10||r===11) r=0;
    return r === parseInt(cpf[10]);
}

document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('errorBox').classList.remove('show');

    const nome = document.getElementById('nome').value.trim();
    const email = document.getElementById('email').value.trim();
    const cpf = document.getElementById('cpf').value.trim();
    const telefone = document.getElementById('telefone').value.trim();
    const senha = document.getElementById('senha').value;
    const confirmar = document.getElementById('confirmar').value;

    if (!nome || !email || !senha) { showError('Preencha os campos obrigatórios'); return; }
    if (senha.length < 6) { showError('Senha deve ter no mínimo 6 caracteres'); return; }
    if (senha !== confirmar) { showError('As senhas não coincidem'); return; }
    if (cpf && !validarCPF(cpf)) { showError('CPF inválido'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Criando conta...';

    try {
        const r = await fetch(`${Auth.API}/api/cadastrar`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nome, email, cpf: cpf || undefined, telefone: telefone || undefined, senha })
        });
        const d = await r.json();

        if (d.success) {
            Auth.setSession(d.token, d.refreshToken);
            window.location.href = '/jogos';
        } else {
            showError(d.error || 'Erro ao criar conta');
            btn.disabled = false;
            btn.textContent = 'Criar Conta Gratuita';
        }
    } catch (err) {
        showError('Erro ao conectar. Tente novamente.');
        btn.disabled = false;
        btn.textContent = 'Criar Conta Gratuita';
    }
});
</script>
</body>
</html>
