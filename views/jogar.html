<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogar - Pou Money</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0C15; color: #E8EDF2; }
        .navbar { background: rgba(10, 12, 21, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(108, 92, 231, 0.2); padding: 16px 0; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; display: flex; justify-content: space-between; align-items: center; }
        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .brand-icon { width: 42px; height: 42px; background: linear-gradient(135deg, #6C5CE7, #00BFA3); border-radius: 14px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .brand-icon img { width: 35px; height: 35px; }
        .brand-text { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #FFFFFF, #6C5CE7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-menu { display: flex; gap: 24px; align-items: center; }
        .nav-link { color: #A0A8C0; text-decoration: none; font-weight: 500; transition: all 0.3s; }
        .nav-link:hover, .nav-link.active { color: #6C5CE7; }
        .btn { padding: 8px 20px; border-radius: 40px; font-weight: 600; text-decoration: none; }
        .btn-primary { background: linear-gradient(135deg, #6C5CE7, #00BFA3); color: white; }
        .main-content { padding: 100px 32px 60px; max-width: 1200px; margin: 0 auto; }
        .game-container { background: linear-gradient(135deg, #1A1F2E, #131725); border-radius: 32px; padding: 40px; text-align: center; border: 1px solid rgba(108, 92, 231, 0.2); }
        .pou-game { width: 100%; max-width: 500px; margin: 0 auto; }
        .pou-character { width: 200px; height: 200px; margin: 0 auto; background: linear-gradient(135deg, #6C5CE7, #00BFA3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 80px; cursor: pointer; transition: all 0.1s; box-shadow: 0 10px 30px rgba(108, 92, 231, 0.3); }
        .pou-character:active { transform: scale(0.95); }
        .game-stats { display: flex; justify-content: center; gap: 40px; margin: 30px 0; flex-wrap: wrap; }
        .stat-card { background: rgba(10, 12, 21, 0.6); border-radius: 20px; padding: 16px 24px; text-align: center; min-width: 120px; }
        .stat-value { font-size: 28px; font-weight: 800; color: #6C5CE7; }
        .stat-label { font-size: 12px; color: #8A92AB; margin-top: 4px; }
        .click-area { margin: 30px 0; }
        .score-display { font-size: 48px; font-weight: 800; margin: 20px 0; }
        .btn-play { background: linear-gradient(135deg, #6C5CE7, #00BFA3); border: none; padding: 15px 40px; border-radius: 40px; color: white; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .warning { background: rgba(255, 193, 7, 0.1); border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 24px; }
        .mobile-menu-btn { display: none; background: none; border: none; font-size: 24px; color: white; cursor: pointer; }
        @media (max-width: 768px) { .nav-menu { display: none; } .mobile-menu-btn { display: block; } .game-stats { gap: 20px; } .stat-card { padding: 12px 16px; } }
        .mobile-nav { display: none; position: fixed; top: 74px; left: 0; width: 100%; background: #0F111A; padding: 20px; flex-direction: column; gap: 16px; z-index: 999; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="brand"><div class="brand-icon"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%236C5CE7'/%3E%3Ccircle cx='35' cy='40' r='6' fill='white'/%3E%3Ccircle cx='65' cy='40' r='6' fill='white'/%3E%3C/svg%3E"></div><div class="brand-text">POU MONEY</div></a>
            <div class="nav-menu"><a href="index.html" class="nav-link">Início</a><a href="jogar.html" class="nav-link active">Jogar</a><a href="ranking.html" class="nav-link">Ranking</a><a href="suporte.html" class="nav-link">Suporte</a><a href="login.html" class="btn btn-primary">Entrar</a></div>
            <button class="mobile-menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
        </div>
        <div class="mobile-nav" id="mobileNav"><a href="index.html">Início</a><a href="jogar.html">Jogar</a><a href="ranking.html">Ranking</a><a href="suporte.html">Suporte</a><a href="login.html">Entrar</a></div>
    </nav>

    <div class="main-content">
        <div id="authWarning" class="warning" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i> Você precisa estar logado para jogar e ganhar prêmios! <a href="login.html" style="color:#6C5CE7;">Faça login aqui</a>
        </div>
        
        <div class="game-container" id="gameContainer" style="display: none;">
            <div class="pou-game">
                <div class="pou-character" id="pouCharacter">
                    <i class="fas fa-smile"></i>
                </div>
                <div class="score-display" id="scoreDisplay">0</div>
                <div class="click-area">
                    <button class="btn-play" id="clickButton">CLIQUE NO POU!</button>
                </div>
                <div class="game-stats">
                    <div class="stat-card"><div class="stat-value" id="moedas">0</div><div class="stat-label">Moedas na partida</div></div>
                    <div class="stat-card"><div class="stat-value" id="saldoUsuario">R$ 0</div><div class="stat-label">Seu Saldo</div></div>
                </div>
                <button class="btn-play" id="salvarButton" style="background: #00BFA3; margin-top: 10px;"><i class="fas fa-save"></i> Salvar Pontuação</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let user = null;
        let token = localStorage.getItem('token');
        let score = 0;
        let moedasPartida = 0;
        
        async function verificarAuth() {
            if (!token) return false;
            try {
                const response = await fetch(`${API_URL}/api/verificar`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                if (data.autenticado) { user = data.user; return true; }
            } catch(e) {}
            return false;
        }
        
        async function carregarSaldo() {
            if (!user) return;
            try {
                const response = await fetch(`${API_URL}/api/verificar`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                if (data.autenticado) {
                    user = data.user;
                    document.getElementById('saldoUsuario').innerHTML = `R$ ${user.saldo.toFixed(2)}`;
                }
            } catch(e) {}
        }
        
        async function salvarPontuacao() {
            if (!user) return;
            if (score === 0 && moedasPartida === 0) {
                alert('Jogue um pouco antes de salvar!');
                return;
            }
            try {
                const response = await fetch(`${API_URL}/api/salvar-pontuacao`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ pontuacao: score, moedas: moedasPartida })
                });
                const result = await response.json();
                if (result.success) {
                    alert(`Pontuação salva! Você ganhou ${moedasPartida} moedas e ${score} pontos!`);
                    score = 0;
                    moedasPartida = 0;
                    document.getElementById('scoreDisplay').innerText = '0';
                    document.getElementById('moedas').innerText = '0';
                    carregarSaldo();
                } else {
                    alert('Erro ao salvar pontuação');
                }
            } catch(e) {
                alert('Erro ao salvar');
            }
        }
        
        async function init() {
            const isAuth = await verificarAuth();
            if (!isAuth) {
                document.getElementById('authWarning').style.display = 'block';
                document.getElementById('gameContainer').style.display = 'none';
                return;
            }
            document.getElementById('authWarning').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            await carregarSaldo();
            
            const pou = document.getElementById('pouCharacter');
            const clickBtn = document.getElementById('clickButton');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const moedasDisplay = document.getElementById('moedas');
            
            function adicionarPonto() {
                score++;
                const moedaGanha = Math.floor(Math.random() * 5) + 1;
                moedasPartida += moedaGanha;
                scoreDisplay.innerText = score;
                moedasDisplay.innerText = moedasPartida;
                
                pou.style.transform = 'scale(0.9)';
                setTimeout(() => { pou.style.transform = 'scale(1)'; }, 100);
            }
            
            pou.addEventListener('click', adicionarPonto);
            clickBtn.addEventListener('click', adicionarPonto);
            
            document.getElementById('salvarButton').addEventListener('click', salvarPontuacao);
        }
        
        init();
        
        const menuBtn = document.getElementById('menuBtn');
        const mobileNav = document.getElementById('mobileNav');
        menuBtn.addEventListener('click', () => { mobileNav.style.display = mobileNav.style.display === 'flex' ? 'none' : 'flex'; });
    </script>
</body>
</html>
