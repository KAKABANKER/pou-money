<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin - Pou Money</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/css/style.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0A0C15}
.card{background:rgba(20,24,36,0.95);border-radius:32px;padding:48px;width:100%;max-width:460px;border:1px solid rgba(255,68,68,0.3)}
.logo-icon{width:80px;height:80px;background:linear-gradient(135deg,#ff4444,#cc0000);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.logo-icon i{font-size:42px;color:white}
.logo h1{font-size:28px;color:#ff4444;text-align:center}
.input-group{margin-bottom:20px}
.input-group input{width:100%;padding:14px 18px;background:rgba(10,12,21,0.8);border:1px solid rgba(255,68,68,0.3);border-radius:16px;color:white;font-size:16px}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#ff4444,#cc0000);border:none;border-radius:16px;color:white;font-size:16px;font-weight:600;cursor:pointer}
.error-msg{background:rgba(255,68,68,0.2);border:1px solid #ff4444;border-radius:12px;padding:12px;margin-bottom:20px;color:#ff8888;display:none}
</style>
</head>
<body>
<div class="card">
    <div class="logo"><div class="logo-icon"><i class="fas fa-shield-alt"></i></div><h1>Painel Admin</h1></div>
    <div id="errorMsg" class="error-msg"></div>
    <form id="loginForm">
        <div class="input-group"><input type="email" id="email" placeholder="Email Admin" required></div>
        <div class="input-group"><input type="password" id="senha" placeholder="Senha" required></div>
        <button type="submit" class="btn-login">Acessar Painel</button>
    </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const errorDiv = document.getElementById('errorMsg');
    errorDiv.style.display = 'none';
    try {
        const r = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, senha })
        });
        const d = await r.json();
        if (d.success && d.user.is_admin) {
            localStorage.setItem('pm_token', d.token);
            localStorage.setItem('pm_refresh', d.refreshToken);
            window.location.href = '/admin-painel';
        } else {
            errorDiv.textContent = 'Acesso negado. Apenas administradores.';
            errorDiv.style.display = 'block';
        }
    } catch(e) {
        errorDiv.textContent = 'Erro ao conectar';
        errorDiv.style.display = 'block';
    }
});
</script>
</body>
</html>
