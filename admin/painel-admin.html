<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Pou Money</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0C15; color: #E8EDF2; }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: #0F111A;
            border-right: 1px solid rgba(108, 92, 231, 0.2);
            padding: 24px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 32px;
            text-align: center;
            background: linear-gradient(135deg, #FFFFFF, #6C5CE7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .nav-item {
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #A0A8C0;
        }
        
        .nav-item:hover, .nav-item.active {
            background: rgba(108, 92, 231, 0.2);
            color: #6C5CE7;
        }
        
        .logout-btn {
            position: absolute;
            bottom: 24px;
            left: 24px;
            right: 24px;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff6666;
        }
        
        .main-content {
            margin-left: 260px;
            padding: 24px 32px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(108, 92, 231, 0.2);
        }
        
        .admin-header h1 { font-size: 28px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: rgba(20, 24, 36, 0.8);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(108, 92, 231, 0.15);
        }
        
        .stat-card .value {
            font-size: 32px;
            font-weight: 800;
            color: #6C5CE7;
        }
        
        .table-container {
            background: rgba(20, 24, 36, 0.6);
            border-radius: 20px;
            overflow-x: auto;
            padding: 20px;
        }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(108, 92, 231, 0.1); }
        th { color: #6C5CE7; }
        
        .status-pendente { background: rgba(255, 193, 7, 0.2); color: #ffc107; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .status-aprovado { background: rgba(0, 191, 163, 0.2); color: #00BFA3; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        
        .btn-action {
            background: #6C5CE7;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            margin: 0 4px;
        }
        
        .loading { text-align: center; padding: 40px; color: #8A92AB; }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-left: 0; padding: 20px; }
            .logout-btn { position: relative; bottom: auto; left: auto; right: auto; margin-top: 20px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">POU MONEY<br><span style="font-size: 12px;">Admin</span></div>
        <div class="nav-item active" data-page="dashboard">
            <i class="fas fa-tachometer-alt"></i> Dashboard
        </div>
        <div class="nav-item" data-page="usuarios">
            <i class="fas fa-users"></i> Usuários
        </div>
        <div class="nav-item" data-page="saques">
            <i class="fas fa-money-bill-wave"></i> Saques
        </div>
        <div class="nav-item logout-btn" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i> Sair
        </div>
    </div>
    
    <div class="main-content">
        <div class="admin-header">
            <h1 id="pageTitle">Dashboard</h1>
            <div><i class="fas fa-shield-alt" style="color:#6C5CE7;"></i> Administrador</div>
        </div>
        <div id="statsGrid" class="stats-grid"></div>
        <div id="tableContainer" class="table-container">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let token = localStorage.getItem('token');
        
        async function verificarAdmin() {
            if (!token) {
                window.location.href = 'admin-login.html';
                return false;
            }
            
            try {
                const response = await fetch(`${API_URL}/api/verificar`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (!data.autenticado || !data.user.is_admin) {
                    localStorage.removeItem('token');
                    window.location.href = 'admin-login.html';
                    return false;
                }
                
                return true;
            } catch (error) {
                window.location.href = 'admin-login.html';
                return false;
            }
        }
        
        async function carregarDashboard() {
            document.getElementById('pageTitle').innerText = 'Dashboard';
            
            try {
                const response = await fetch(`${API_URL}/api/admin/usuarios`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const usuarios = await response.json();
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card"><div class="value">${usuarios.length}</div><h3>Total Usuários</h3></div>
                    <div class="stat-card"><div class="value">${usuarios.filter(u => u.ativo).length}</div><h3>Usuários Ativos</h3></div>
                `;
                
                let html = '<h3 style="margin-bottom:16px;">📋 Últimos Usuários</h3><tr><thead><tr><th>ID</th><th>Nome</th><th>Email</th><th>Saldo</th><th>Status</th></tr></thead><tbody>';
                usuarios.slice(0, 10).forEach(u => {
                    html += `<tr><td>${u.id}</td><td>${u.nome}</td><td>${u.email}</td><td>R$ ${parseFloat(u.saldo).toFixed(2)}</td><td>${u.ativo ? '✅ Ativo' : '❌ Inativo'}</td></tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('tableContainer').innerHTML = html;
            } catch (error) {
                document.getElementById('tableContainer').innerHTML = '<div class="loading">Erro ao carregar</div>';
            }
        }
        
        async function carregarUsuarios() {
            document.getElementById('pageTitle').innerText = 'Usuários';
            
            try {
                const response = await fetch(`${API_URL}/api/admin/usuarios`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const usuarios = await response.json();
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card"><div class="value">${usuarios.length}</div><h3>Total</h3></div>
                    <div class="stat-card"><div class="value">${usuarios.filter(u => u.ativo).length}</div><h3>Ativos</h3></div>
                `;
                
                let html = '<table><thead><tr><th>ID</th><th>Nome</th><th>Email</th><th>Saldo</th><th>Moedas</th><th>Pontos</th><th>Nível</th><th>Status</th></tr></thead><tbody>';
                usuarios.forEach(u => {
                    html += `<tr><td>${u.id}</td><td>${u.nome}</td><td>${u.email}</td><td>R$ ${parseFloat(u.saldo).toFixed(2)}</td><td>${u.moedas}</td><td>${u.pontos}</td><td>${u.nivel}</td><td>${u.ativo ? '✅ Ativo' : '❌ Inativo'}</td></tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('tableContainer').innerHTML = html;
            } catch (error) {
                document.getElementById('tableContainer').innerHTML = '<div class="loading">Erro ao carregar</div>';
            }
        }
        
        async function carregarSaques() {
            document.getElementById('pageTitle').innerText = 'Saques';
            
            try {
                const response = await fetch(`${API_URL}/api/admin/transacoes`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const transacoes = await response.json();
                const saques = transacoes.filter(t => t.tipo === 'saque');
                const pendentes = saques.filter(s => s.status === 'pendente');
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card"><div class="value">${pendentes.length}</div><h3>Pendentes</h3></div>
                    <div class="stat-card"><div class="value">R$ ${saques.reduce((acc, s) => acc + parseFloat(s.valor), 0).toFixed(2)}</div><h3>Total Solicitado</h3></div>
                `;
                
                let html = '<tr><thead><tr><th>ID</th><th>Usuário</th><th>Valor</th><th>Data</th><th>Status</th></tr></thead><tbody>';
                saques.forEach(s => {
                    html += `<tr><td>${s.id}</td><td>${s.user_nome}</td><td style="color:#00BFA3;">R$ ${parseFloat(s.valor).toFixed(2)}</td><td>${new Date(s.data_solicitacao).toLocaleString()}</td><td><span class="status-${s.status === 'pendente' ? 'pendente' : 'aprovado'}">${s.status}</span></td></tr>`;
                });
                if (saques.length === 0) html += '<tr><td colspan="5" style="text-align:center;">Nenhum saque</td></tr>';
                html += '</tbody></table>';
                document.getElementById('tableContainer').innerHTML = html;
            } catch (error) {
                document.getElementById('tableContainer').innerHTML = '<div class="loading">Erro ao carregar</div>';
            }
        }
        
        // Navegação
        document.querySelectorAll('.nav-item[data-page]').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                const page = item.dataset.page;
                if (page === 'dashboard') carregarDashboard();
                else if (page === 'usuarios') carregarUsuarios();
                else if (page === 'saques') carregarSaques();
            });
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'admin-login.html';
        });
        
        verificarAdmin().then(isAdmin => {
            if (isAdmin) carregarDashboard();
        });
    </script>
</body>
</html>
